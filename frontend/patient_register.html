<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Registration – Healthcare Portal</title>
    <meta name="description" content="Register as a patient to access the healthcare portal services." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="auth-page register-page">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="register-container">
        <div class="register-header">
            <a href="patient_login.html" class="back-link">← Back to Login</a>
            <div class="auth-brand dark">
                <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="12" fill="#2563EB" />
                    <path d="M20 8v24M8 20h24" stroke="#fff" stroke-width="4" stroke-linecap="round" />
                </svg>
                <span>HealthCare Portal</span>
            </div>
            <h1>Create Patient Account</h1>
            <p class="form-sub">Fill in all sections to complete your registration.</p>
        </div>

        <!-- Progress Steps -->
        <div class="progress-steps" id="progress-steps">
            <div class="step active" data-step="1"><span>1</span> Personal Info</div>
            <div class="step-line"></div>
            <div class="step" data-step="2"><span>2</span> Health Info</div>
            <div class="step-line"></div>
            <div class="step" data-step="3"><span>3</span> Emergency Contact</div>
        </div>

        <div id="alert-box" class="alert hidden"></div>

        <form id="register-form" novalidate>

            <!-- STEP 1: Personal Information -->
            <div class="form-section active" id="section-1">
                <h2 class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                    </svg>
                    Personal Information
                </h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required />
                    </div>
                    <div class="form-group">
                        <label for="dob">Date of Birth *</label>
                        <input type="date" id="dob" name="dob" required />
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender *</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                            <option>Prefer not to say</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required />
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number" maxlength="10"
                            required />
                    </div>
                    <div class="form-group">
                        <label for="aadhar">Aadhaar Number *</label>
                        <input type="text" id="aadhar" name="aadhar" placeholder="12-digit Aadhaar number"
                            maxlength="12" required />
                    </div>
                    <div class="form-group full-width">
                        <label for="address">Address *</label>
                        <textarea id="address" name="address" placeholder="Full residential address" rows="2"
                            required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="password">Create Password *</label>
                        <div class="input-wrap">
                            <input type="password" id="password" name="password" placeholder="Minimum 6 characters"
                                required />
                            <button type="button" class="eye-btn" id="toggle-pw" aria-label="Toggle password">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password *</label>
                        <input type="password" id="confirm-password" name="confirm_password"
                            placeholder="Re-enter password" required />
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary" id="next-1">Next: Health Info →</button>
                </div>
            </div>

            <!-- STEP 2: Health Information -->
            <div class="form-section hidden" id="section-2">
                <h2 class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                    Health Information
                </h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="blood_group">Blood Group *</label>
                        <select id="blood_group" name="blood_group" required>
                            <option value="">Select blood group</option>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="allergies">Known Allergies</label>
                        <textarea id="allergies" name="allergies"
                            placeholder="e.g. Penicillin, Peanuts (leave blank if none)" rows="2"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label for="medical_conditions">Existing Medical Conditions</label>
                        <textarea id="medical_conditions" name="medical_conditions"
                            placeholder="e.g. Diabetes Type 2, Hypertension (leave blank if none)" rows="2"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label for="medications">Current Medications</label>
                        <textarea id="medications" name="medications"
                            placeholder="e.g. Metformin 500mg, Amlodipine 5mg (leave blank if none)"
                            rows="2"></textarea>
                    </div>
                </div>
                <div class="form-actions space-between">
                    <button type="button" class="btn btn-outline" id="back-1">← Back</button>
                    <button type="button" class="btn btn-primary" id="next-2">Next: Emergency Contact →</button>
                </div>
            </div>

            <!-- STEP 3: Emergency Contact -->
            <div class="form-section hidden" id="section-3">
                <h2 class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 17z" />
                    </svg>
                    Emergency Contact
                </h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="emergency_name">Contact Full Name *</label>
                        <input type="text" id="emergency_name" name="emergency_name"
                            placeholder="Name of emergency contact" required />
                    </div>
                    <div class="form-group">
                        <label for="emergency_phone">Contact Phone Number *</label>
                        <input type="tel" id="emergency_phone" name="emergency_phone"
                            placeholder="10-digit mobile number" maxlength="10" required />
                    </div>
                    <div class="form-group">
                        <label for="relationship">Relationship *</label>
                        <select id="relationship" name="relationship" required>
                            <option value="">Select relationship</option>
                            <option>Spouse</option>
                            <option>Parent</option>
                            <option>Sibling</option>
                            <option>Child</option>
                            <option>Friend</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions space-between">
                    <button type="button" class="btn btn-outline" id="back-2">← Back</button>
                    <button type="submit" class="btn btn-primary" id="register-btn">
                        <span id="btn-text">Create Account</span>
                        <span id="btn-spinner" class="spinner hidden"></span>
                    </button>
                </div>
            </div>
        </form>

        <div class="auth-switch center">
            Already have an account? <a href="patient_login.html">Sign in here</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        initPatientRegister();
    </script>
</body>

</html>
